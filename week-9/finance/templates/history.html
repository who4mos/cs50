{% extends "layout.html" %}

{% block title %}
    Log In
{% endblock %}

{% block main %}

<table class="table table-striped">
  <thead>
    <tr>
      <th>Symbol</th>
      <th>Shares</th>
      <th>Price</th>
      <th>Date</th>
    </tr>
  </thead>
  <tbody>
    {% for transaction in transactions %}
    <tr>
      <td>{{ transaction['symbol'] }}</td>
      <td>{{ transaction['price'] | usd }}</td>
      <td>{{ transaction['shares'] }}</td>
      <td>{{ transaction['date'] }}</td>
    </tr>
    {% endfor %}
  </tbody>
  
</table>
{% endblock %}
